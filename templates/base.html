<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}IR Inventory{% endblock %}</title>
    <style>
      :root { color-scheme: light; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #f6f7fb; color: #111827; }
      header { background: #111827; color: #fff; padding: 16px 20px; }
      header a { color: #fff; text-decoration: underline; }
      main { max-width: 1100px; margin: 18px auto; padding: 0 16px 32px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px; box-shadow: 0 1px 1px rgba(0,0,0,.03); }
      h1 { margin: 0; font-size: 18px; }
      h2 { margin: 0 0 10px; font-size: 16px; }
      label { display: block; font-size: 12px; color: #374151; margin: 10px 0 4px; }
      input, select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 10px; background: #fff; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .actions { display: flex; gap: 8px; margin-top: 12px; }
      button { cursor: pointer; border: 0; border-radius: 10px; padding: 10px 12px; font-weight: 600; }
      .btn-primary { background: #2563eb; color: #fff; }
      .btn-secondary { background: #111827; color: #fff; }
      .muted { color: #6b7280; font-size: 12px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border-bottom: 1px solid #e5e7eb; padding: 8px; text-align: left; font-size: 13px; }
      th { font-size: 12px; color: #374151; }
      .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; border: 1px solid #e5e7eb; background: #f9fafb; }
      .msg { padding: 10px 12px; border-radius: 10px; border: 1px solid; margin-bottom: 10px; }
      .msg-success { background: #ecfdf5; border-color: #10b981; }
      .msg-error { background: #fef2f2; border-color: #ef4444; }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } .row { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header>
      <div style="max-width: 1100px; margin: 0 auto; padding: 0 16px; display:flex; align-items:center; justify-content:space-between;">
        <h1>IR Inventory</h1>
        <div class="muted" style="color:#e5e7eb;">
          <a href="/admin/">Админка</a>
        </div>
      </div>
    </header>
    <main>
      {% if messages %}
        {% for message in messages %}
          <div class="msg {% if message.tags %}msg-{{ message.tags }}{% endif %}">{{ message }}</div>
        {% endfor %}
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
